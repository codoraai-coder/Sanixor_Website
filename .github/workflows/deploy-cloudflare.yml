name: Deploy to Cloudflare

# Builds the SPA and deploys it to Cloudflare Workers (static assets) on every
# push to main. This is the canonical production deployment pipeline.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — token with the "Edit Cloudflare Workers" template
#   CLOUDFLARE_ACCOUNT_ID  — from the Cloudflare dashboard (Workers & Pages)
#   VITE_API_BASE_URL      — production API base URL (defaults to https://api.sanixor.space)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-frontend-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'https://api.sanixor.space' }}

      # Use the project's pinned Wrangler (v4, from package.json) rather than
      # cloudflare/wrangler-action's bundled v3.90.0, which is too old for this
      # config (static-assets SPA + account_id) and fails the deploy.
      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
