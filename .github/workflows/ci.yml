name: CI

# Build-failure detection for the frontend. Runs on every push/PR to the deploy
# branch (this repo deploys from `master`). The host (Vercel / Cloudflare Pages)
# performs the actual deploy on push; this gate catches type/build errors early
# so a broken build never ships.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.sanixor.space
